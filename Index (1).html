<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLAN 极速冲刺</title>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 导航进度 */
        .header { width: 100%; max-width: 600px; padding: 15px; display: flex; align-items: center; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); sticky; top:0; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; flex-grow: 1; margin: 0 15px; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--primary); transition: 0.3s; width: 0%; }

        /* 答题卡片 */
        #quiz-container { width: 90%; max-width: 550px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        .q-text { font-size: 1.2em; font-weight: bold; margin-bottom: 20px; line-height: 1.4; }
        
        /* 选项列表 */
        .options-list { display: flex; flex-direction: column; gap: 10px; }
        .opt-item { padding: 15px; border: 2px solid #f0f0f0; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .opt-item:hover { background: #f9f9f9; }
        
        /* 状态样式 */
        .opt-item.correct { background: #d4edda !important; border-color: var(--success) !important; color: #155724; }
        .opt-item.wrong { background: #f8d7da !important; border-color: var(--danger) !important; color: #721c24; }
        .opt-item.missed { border-color: var(--success); border-style: dashed; background: #f0fff4; }
        .opt-item.selected { border-color: var(--primary); background: #ebf8ff; }

        input { margin-right: 12px; transform: scale(1.2); pointer-events: none; }

        /* 按钮区 */
        .actions { margin-top: 25px; display: flex; gap: 10px; padding-top: 15px; border-top: 1px solid #eee; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; flex: 1; font-weight: bold; font-size: 1em; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-next { background: #34495e; color: white; }
        
        /* 解析与结果 */
        .ans-note { margin-top: 15px; padding: 15px; background: #fff3cd; border-radius: 6px; color: #856404; }
        .result-screen { text-align: center; }
        .wrong-record { text-align: left; margin-top: 20px; padding: 10px; background: #fff5f5; border-radius: 6px; font-size: 0.9em; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <b onclick="location.reload()" style="cursor:pointer">HOME</b>
        <div class="progress-bar"><div id="p-inner" class="progress-inner"></div></div>
        <span id="p-text">0/0</span>
    </div>

    <div id="quiz-container">
        <div id="m-screen">
            <h3 style="text-align:center">选择题库</h3>
            <div class="options-list">
                <button class="btn btn-blue" onclick="loadSet('single_choice')">单选题</button>
                <button class="btn btn-blue" onclick="loadSet('multi_choice')">多选题</button>
                <button class="btn btn-blue" onclick="loadSet('true_false')">判断题</button>
                <button class="btn btn-blue" onclick="loadSet('fill_in')">填空题</button>
                <button class="btn btn-blue" onclick="loadSet('short_answer')">简答题</button>
            </div>
        </div>

        <div id="q-screen" class="hidden">
            <div id="q-title" class="q-text"></div>
            <div id="q-opts" class="options-list"></div>
            <div id="q-ans" class="ans-note hidden"></div>
            <div class="actions">
                <button id="btn-submit" class="btn btn-blue hidden" onclick="checkMulti()">确认提交</button>
                <button id="btn-show" class="btn btn-blue hidden" onclick="checkText()">显示答案</button>
                <button id="btn-next" class="btn btn-next hidden" onclick="next()">下一题</button>
            </div>
        </div>

        <div id="r-screen" class="hidden result-screen">
            <h2>训练结束</h2>
            <h1 id="r-score" style="color:var(--primary)">0%</h1>
            <div id="r-wrongs"></div>
            <button class="btn btn-blue" style="width:100%; margin-top:20px" onclick="location.reload()">重新开始</button>
        </div>
    </div>

    <script>
        let data = {}, questions = [], curr = 0, score = 0, wrongs = [], mode = '', answered = false;

        fetch('questions.json').then(r => r.json()).then(d => data = d);

        function loadSet(m) {
            mode = m; questions = data[m]; curr = 0; score = 0; wrongs = [];
            if(!questions) return alert("题库为空");
            document.getElementById('m-screen').classList.add('hidden');
            document.getElementById('q-screen').classList.remove('hidden');
            render();
        }

        function render() {
            answered = false;
            const q = questions[curr];
            document.getElementById('q-title').innerText = `${curr+1}. ${q.question}`;
            document.getElementById('q-ans').classList.add('hidden');
            document.getElementById('p-inner').style.width = (curr/questions.length)*100 + '%';
            document.getElementById('p-text').innerText = `${curr+1}/${questions.length}`;
            
            const box = document.getElementById('q-opts');
            box.innerHTML = '';
            
            // 按钮重置
            document.getElementById('btn-submit').classList.add('hidden');
            document.getElementById('btn-show').classList.add('hidden');
            document.getElementById('btn-next').classList.add('hidden');

            if(['single_choice','multi_choice','true_false'].includes(mode)) {
                q.options.forEach(o => {
                    const key = o.split('.')[0].trim();
                    const div = document.createElement('div');
                    div.className = 'opt-item';
                    div.innerHTML = `<input type="${mode==='multi_choice'?'checkbox':'radio'}" name="opt" value="${key}"><span>${o}</span>`;
                    
                    div.onclick = () => {
                        if(answered && mode !== 'multi_choice') return;
                        const input = div.querySelector('input');

                        if(mode === 'multi_choice') {
                            input.checked = !input.checked;
                            div.classList.toggle('selected', input.checked);
                            document.getElementById('btn-submit').classList.remove('hidden');
                        } else {
                            input.checked = true;
                            checkInstant(key, div);
                        }
                    };
                    box.appendChild(div);
                });
            } else {
                document.getElementById('btn-show').classList.remove('hidden');
            }
        }

        // 单选/判断立即判定
        function checkInstant(key, el) {
            answered = true;
            const q = questions[curr];
            if(key === q.answer) {
                el.classList.add('correct');
                score++;
                setTimeout(next, 500);
            } else {
                el.classList.add('wrong');
                wrongs.push({...q, user: key});
                showRight(q.answer);
                document.getElementById('btn-next').classList.remove('hidden');
            }
        }

        // 多选手动判定
        function checkMulti() {
            if(answered) return;
            answered = true;
            const q = questions[curr];
            const selected = Array.from(document.querySelectorAll('input:checked')).map(i => i.value).sort().join('');
            const right = q.answer.split('').sort().join('');

            document.getElementById('btn-submit').classList.add('hidden');

            if(selected === right) {
                score++;
                document.querySelectorAll('.opt-item').forEach(el => {
                    if(selected.includes(el.querySelector('input').value)) el.classList.add('correct');
                });
                setTimeout(next, 500);
            } else {
                wrongs.push({...q, user: selected});
                document.querySelectorAll('.opt-item').forEach(el => {
                    const val = el.querySelector('input').value;
                    if(right.includes(val)) el.classList.add('correct');
                    if(selected.includes(val) && !right.includes(val)) el.classList.add('wrong');
                });
                document.getElementById('btn-next').classList.remove('hidden');
            }
        }

        function checkText() {
            document.getElementById('q-ans').innerHTML = "<b>正确答案：</b><br>" + questions[curr].answer;
            document.getElementById('q-ans').classList.remove('hidden');
            document.getElementById('btn-show').classList.add('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
            score++; // 填空默认计分
        }

        function showRight(ans) {
            document.querySelectorAll('.opt-item').forEach(el => {
                if(ans === el.querySelector('input').value) el.classList.add('missed');
            });
        }

        function next() {
            curr++;
            if(curr < questions.length) render();
            else finish();
        }

        function finish() {
            document.getElementById('q-screen').classList.add('hidden');
            document.getElementById('r-screen').classList.remove('hidden');
            document.getElementById('r-score').innerText = Math.round((score/questions.length)*100) + '%';
            
            const box = document.getElementById('r-wrongs');
            box.innerHTML = '<h4>错题回顾：</h4>';
            if(wrongs.length === 0) box.innerHTML += '<p>全对！太棒了！</p>';
            wrongs.forEach(w => {
                box.innerHTML += `<div class="wrong-record"><b>问：</b>${w.question}<br><span style="color:var(--danger)">你选：${w.user || '无'}</span> | <span style="color:var(--success)">正解：${w.answer}</span></div>`;
            });
        }
    </script>
</body>
</html>
